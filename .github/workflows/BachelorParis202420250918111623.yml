name: Build and deploy .NET Core application to Azure Web App

on:
  push:
    branches:
      - master

env:
  AZURE_WEBAPP_NAME: BachelorParis202420250918111623 
  CONFIGURATION: Release
  DOTNET_CORE_VERSION: 8.0.x
  WORKING_DIRECTORY: ./BachelorParis2024

jobs:
  build-and-deploy:
    runs-on: windows-latest
    steps:
      # 1. Récupération du code
      - uses: actions/checkout@v4

      # 2. Installation du SDK .NET
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_CORE_VERSION }}

      # 3. Restauration des dépendances
      - name: Restore
        run: dotnet restore "${{ env.WORKING_DIRECTORY }}"

      # 4. Compilation
      - name: Build
        run: dotnet build "${{ env.WORKING_DIRECTORY }}" --configuration ${{ env.CONFIGURATION }} --no-restore

      # 5. Tests unitaires (optionnel)
      - name: Test
        run: dotnet test "${{ env.WORKING_DIRECTORY }}" --no-build

      # 6. Publication dans ./publish
      - name: Publish
        run: dotnet publish "${{ env.WORKING_DIRECTORY }}" --configuration ${{ env.CONFIGURATION }} --no-build --output ./publish

      # 7. Connexion à Azure avec le secret GitHub
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 8. Déploiement sur l’App Service
      - name: Deploy to Azure WebApp
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: ./publish

