name: Build and deploy .NET Core application to Azure Web App

on:
  push:
    branches:
      - master

env:
  AZURE_WEBAPP_NAME: BachelorParis202420250918111623 
  CONFIGURATION: Release
  DOTNET_CORE_VERSION: 8.0.x
  AZURE_WEBAPP_PACKAGE_PATH: ./publish

jobs:
  build-and-deploy:
    runs-on: windows-2022   # runner figť pour stabilitť

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.401'   # version exacte du SDK 

      - name: Restore dependencies
        run: dotnet restore BachelorParis2024

      - name: Build
        run: dotnet build BachelorParis2024 -c Release --no-restore

      #  Restauration des outils locaux (dotnet-ef)
      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Vťrifier les outils restaurťs
        run: dotnet tool list --local

      #  Exťcution des migrations EF Core
      - name: Run EF Core migrations
        run: dotnet ef database update --project BachelorParis2024.Repository --startup-project BachelorParis2024
        env:
          ConnectionStrings__AZURE_SQL_CONNECTIONSTRING: ${{ secrets.AZURE_SQL_CONNECTIONSTRING }}

      - name: Publish
        run: dotnet publish BachelorParis2024 -c Release -o ./publish

      - name: Deploy to Azure WebApp
        uses: azure/webapps-deploy@v2
        with:
          app-name: BachelorParis202420250918111623
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish

